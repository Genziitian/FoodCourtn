name: foodcourt_mobile
description: FoodCourt customer mobile app. Native Flutter twin of the existing PWA at apps/customer.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Routing & state — same idioms as Riverpod docs.
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1

  # Backend — same Supabase project the web app uses.
  supabase_flutter: ^2.5.6

  # Local persistence (TTL'd auth cache, cart).
  shared_preferences: ^2.2.3

  # HTTP fallback when we need to hit Edge Functions directly.
  dio: ^5.5.0

  # Razorpay — add back when wiring payments. Current versions of
  # razorpay_flutter ship two AARs with the same `com.razorpay` namespace,
  # which the newer Android Gradle Plugin rejects with a manifest-merger
  # error. Re-introduce alongside the namespace exclusion in
  # android/app/build.gradle.kts when we actually integrate Razorpay.
  # razorpay_flutter: ^1.3.7

  # Geolocation for delivery radius check.
  geolocator: ^12.0.0

  # Image caching for menu thumbs.
  cached_network_image: ^3.3.1

  # Numbers / dates.
  intl: ^0.19.0

  # Env var loading (--dart-define-from-file).
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/images/
